# RF-DETR Small on VisDrone — second baseline / stronger comparison configuration.
# Usage:
#   rfdetr fit --config configs/rfdetr_visdrone_small.yaml
#   rfdetr validate --config configs/rfdetr_visdrone_small.yaml --ckpt_path output/visdrone_small/last.ckpt

model:
  model_config:
    encoder: dinov2_windowed_small
    out_feature_indexes: [3, 6, 9, 12]
    dec_layers: 3
    two_stage: true
    projector_scale: [P4]
    hidden_dim: 256
    patch_size: 16
    num_windows: 2
    sa_nheads: 8
    ca_nheads: 16
    dec_n_points: 2
    resolution: 512
    positional_encoding_size: 32
    pretrain_weights: rf-detr-small.pth
    num_classes: 10
  train_config:
    dataset_file: roboflow
    dataset_dir: data/visdrone_rfdetr
    output_dir: output/visdrone_small
    project: visdrone
    run: rfdetr_small_baseline
    epochs: 100
    batch_size: 6
    grad_accum_steps: 1
    num_workers: 4
    tensorboard: true
    wandb: false
    mlflow: false
    use_ema: true
    multi_scale: true
    eval_interval: 1
    checkpoint_interval: 5
    run_test: false
